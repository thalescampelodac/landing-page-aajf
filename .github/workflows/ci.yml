name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-production:
    name: Deploy to Vercel production
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        if: env.VERCEL_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.VERCEL_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.VERCEL_TOKEN != ''
        run: npm ci

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Skip deploy when Vercel token is not configured
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN is not configured in GitHub Actions secrets. Skipping production deploy."

  deploy-preview:
    name: Deploy Preview to Vercel
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        if: env.VERCEL_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.VERCEL_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.VERCEL_TOKEN != ''
        run: npm ci

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview to Vercel
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Skip deploy when Vercel token is not configured
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN is not configured in GitHub Actions secrets. Skipping preview deploy."
